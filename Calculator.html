<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PrecisionCalc | Modern Web Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* avoid accidental selection while tapping */
        }

        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* main card */
        .calculator {
            max-width: 480px;
            width: 100%;
            background: rgba(22, 28, 36, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 56px;
            padding: 24px 20px 32px 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
        }

        /* display panel */
        .display-section {
            background: #0b0f14;
            border-radius: 44px;
            padding: 20px 24px;
            margin-bottom: 28px;
            box-shadow: inset 0 5px 8px rgba(0, 0, 0, 0.5), 0 2px 3px rgba(255, 255, 255, 0.05);
        }

        .expression {
            min-height: 36px;
            font-size: 1.3rem;
            color: #9aaebf;
            text-align: right;
            font-weight: 450;
            letter-spacing: 0.5px;
            word-wrap: break-word;
            word-break: break-all;
            font-family: 'JetBrains Mono', 'SF Mono', monospace;
        }

        .result {
            text-align: right;
            font-size: 3.2rem;
            font-weight: 700;
            color: #f0f3f8;
            margin-top: 10px;
            word-wrap: break-word;
            word-break: break-word;
            line-height: 1.2;
            font-family: 'JetBrains Mono', 'SF Mono', monospace;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 3px rgba(0,0,0,0.2);
        }

        /* button grid */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        button {
            background: #1f2a32;
            border: none;
            padding: 18px 0;
            font-size: 1.7rem;
            font-weight: 600;
            border-radius: 60px;
            color: #eef4ff;
            cursor: pointer;
            transition: 0.1s linear;
            font-family: inherit;
            box-shadow: 0 6px 0 #0f1318;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0f1318;
        }

        /* special styling */
        .operator {
            background: #2c3e4e;
            color: #fbcb6e;
            font-size: 1.9rem;
            font-weight: 700;
            box-shadow: 0 6px 0 #1c2a35;
        }

        .equals {
            background: #e67e22;
            color: white;
            box-shadow: 0 6px 0 #b45f1b;
            font-size: 2rem;
        }

        .clear, .backspace {
            background: #2f424f;
            color: #ffaa66;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .clear:active, .backspace:active {
            transform: translateY(3px);
        }

        .number {
            background: #26333e;
            font-weight: 600;
        }

        .zero {
            grid-column: span 2;
        }

        /* responsive touch */
        @media (max-width: 460px) {
            .calculator {
                padding: 18px 14px 26px 14px;
            }
            .buttons-grid {
                gap: 10px;
            }
            button {
                padding: 14px 0;
                font-size: 1.5rem;
            }
            .result {
                font-size: 2.6rem;
            }
            .expression {
                font-size: 1rem;
            }
        }

        /* footer note (github ready) */
        .git-badge {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #7f95af;
        }
        .git-badge a {
            color: #c0d4f0;
            text-decoration: none;
        }
        .git-badge a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="calculator">
    <div class="display-section">
        <div class="expression" id="expressionDisplay">0</div>
        <div class="result" id="resultDisplay">0</div>
    </div>
    <div class="buttons-grid">
        <!-- row 1 -->
        <button class="clear" data-action="clear">AC</button>
        <button class="backspace" data-action="backspace">⌫</button>
        <button class="operator" data-op="%">%</button>
        <button class="operator" data-op="/">÷</button>

        <!-- row 2 -->
        <button class="number" data-num="7">7</button>
        <button class="number" data-num="8">8</button>
        <button class="number" data-num="9">9</button>
        <button class="operator" data-op="*">×</button>

        <!-- row 3 -->
        <button class="number" data-num="4">4</button>
        <button class="number" data-num="5">5</button>
        <button class="number" data-num="6">6</button>
        <button class="operator" data-op="-">−</button>

        <!-- row 4 -->
        <button class="number" data-num="1">1</button>
        <button class="number" data-num="2">2</button>
        <button class="number" data-num="3">3</button>
        <button class="operator" data-op="+">+</button>

        <!-- row 5 -->
        <button class="number zero" data-num="0">0</button>
        <button class="number" data-num=".">.</button>
        <button class="equals" data-action="equals">=</button>
    </div>
    <div class="git-badge">
        🧮 <strong>PrecisionCalc</strong> — ready for GitHub Pages • clean & fast
    </div>
</div>

<script>
    (function() {
        // ----- state management -----
        let currentExpression = "";    // string that user sees (expression line)
        let lastResult = null;          // store last computed result for "ans" behavior?
        let lastActionWasEquals = false;
        let pendingEvaluation = false;   // flag for syntax continuity

        // DOM elements
        const expressionEl = document.getElementById("expressionDisplay");
        const resultEl = document.getElementById("resultDisplay");

        // Helper: update display (expression & main result)
        function updateDisplay() {
            // expression area: if empty, show placeholder "0"
            if (currentExpression === "") {
                expressionEl.innerText = "0";
            } else {
                expressionEl.innerText = currentExpression;
            }

            // try to evaluate 'live' preview if expression not empty & no trailing operator issue
            if (currentExpression.trim() !== "") {
                try {
                    // clean expression for safe evaluation (replace visual operators with JS operators)
                    let evalExpr = prepareExpressionForEval(currentExpression);
                    if (evalExpr !== null && evalExpr !== "") {
                        // Use Function for safer eval (but since it's pure math, it's fine)
                        // For better precision, we avoid direct eval but Function constructor handles math scope.
                        let computed = evaluateMath(evalExpr);
                        if (computed !== undefined && !isNaN(computed) && isFinite(computed)) {
                            let formatted = formatNumber(computed);
                            resultEl.innerText = formatted;
                        } else {
                            if (computed === undefined || isNaN(computed)) {
                                resultEl.innerText = "Error";
                            } else {
                                resultEl.innerText = "Error";
                            }
                        }
                    } else {
                        // no valid expression -> show last result or empty
                        if (lastResult !== null && !lastActionWasEquals) {
                            resultEl.innerText = formatNumber(lastResult);
                        } else if (currentExpression === "") {
                            resultEl.innerText = "0";
                        } else {
                            resultEl.innerText = "0";
                        }
                    }
                } catch (e) {
                    resultEl.innerText = "Error";
                }
            } else {
                // if expression empty, result = 0 (unless lastResult from equals still relevant)
                if (currentExpression === "" && !lastActionWasEquals) {
                    resultEl.innerText = "0";
                } else if (currentExpression === "" && lastActionWasEquals && lastResult !== null) {
                    resultEl.innerText = formatNumber(lastResult);
                } else if (currentExpression === "") {
                    resultEl.innerText = "0";
                }
            }
        }

        // convert displayed expression (with visual operators ÷, ×, −) to JS math string
        function prepareExpressionForEval(expr) {
            if (expr === "") return "";
            let processed = expr;
            // replace visual division, multiplication, subtraction
            processed = processed.replace(/÷/g, '/');
            processed = processed.replace(/×/g, '*');
            processed = processed.replace(/−/g, '-');
            // allow percentage handling: we will treat % as /100 (but must apply to preceding number)
            // For simplicity, we wrap % handling in evaluation: replace pattern (number)% -> (number/100)
            // But note: complex like 50+20% should be 50+0.2? standard calc: 20% of 50? That's ambiguous.
            // We adopt universal behavior: percentage just divides previous number by 100.
            // Better: replace any occurrence of a number followed by % without breaking:
            processed = processed.replace(/(\d+(?:\.\d+)?)%/g, (match, p1) => {
                return `(${p1}/100)`;
            });
            // also if expression starts with % or invalid, clean
            // manage multiple consecutive operators: simple replace "--" etc but our UI prevents.
            return processed;
        }

        // safe evaluation with advanced fallback, handle division by zero edge.
        function evaluateMath(mathStr) {
            if (mathStr === null || mathStr.trim() === "") return NaN;
            // prevent dangerous injections
            if (/[^0-9+\-*/()% .]/g.test(mathStr)) {
                if (/[a-zA-Z]/g.test(mathStr)) return NaN;  // no letters
            }
            try {
                // using Function constructor is safer than eval and gives local scope.
                let fn = new Function('return (' + mathStr + ')');
                let result = fn();
                return result;
            } catch (err) {
                // fallback attempt: maybe trailing operator? but we cleaned before
                return NaN;
            }
        }

        // format number to avoid huge decimals, preserve natural look
        function formatNumber(num) {
            if (num === undefined || isNaN(num) || !isFinite(num)) return "Error";
            // if near integer, show integer
            if (Math.abs(num - Math.round(num)) < 1e-12) {
                return num.toFixed(0);
            }
            // max 10 decimal places for cleanliness, trim trailing zeros.
            let fixed = num.toFixed(10).replace(/\.?0+$/, '');
            if (fixed === "") return "0";
            // handle huge numbers and scientific notation limit
            if (Math.abs(num) > 1e+15 || (Math.abs(num) < 1e-9 && num !== 0)) {
                return num.toExponential(8);
            }
            return fixed;
        }

        // recompute and store last result for equals, and for continuous chaining
        function computeExpression(exprToCompute) {
            if (!exprToCompute || exprToCompute.trim() === "") return null;
            let prepared = prepareExpressionForEval(exprToCompute);
            if (prepared === "") return null;
            let computed = evaluateMath(prepared);
            if (isNaN(computed) || !isFinite(computed)) {
                return null;
            }
            return computed;
        }

        // Append value/number/operator with smart logic
        function handleInput(value, type) {
            // reset if last action was equals and now new number (start fresh)
            if (lastActionWasEquals && (type === 'number' || type === 'decimal')) {
                currentExpression = "";
                lastActionWasEquals = false;
                lastResult = null;
            } 
            else if (lastActionWasEquals && type === 'operator') {
                // after equals, if user presses operator, use previous result as start
                if (lastResult !== null && !isNaN(lastResult) && isFinite(lastResult)) {
                    currentExpression = formatNumber(lastResult);
                    lastActionWasEquals = false;
                } else {
                    lastActionWasEquals = false;
                }
            }

            // handle decimal edge
            if (type === 'decimal') {
                // check current token (last number) to avoid double decimal
                let parts = currentExpression.split(/[÷×+−/%]/);
                let lastToken = parts[parts.length - 1];
                if (lastToken.includes('.')) {
                    // already has decimal, ignore
                    return;
                }
                if (lastToken === "") {
                    currentExpression += "0.";
                } else {
                    currentExpression += ".";
                }
                updateDisplay();
                return;
            }

            if (type === 'number') {
                // avoid leading zeros: if expression is empty or last token is '0' but not decimal
                let tokens = currentExpression.split(/([÷×+−])/);
                let lastSegment = tokens[tokens.length - 1];
                if (lastSegment === "0" && (value === "0" || value !== ".")) {
                    // replace trailing zero with just new digit, but not for multi-digit
                    if (currentExpression.endsWith("0") && !currentExpression.endsWith(".") && (currentExpression.length === 1 || /[÷×+−]$/.test(currentExpression.slice(0, -1)))) {
                        currentExpression = currentExpression.slice(0, -1) + value;
                    } else {
                        currentExpression += value;
                    }
                } else {
                    currentExpression += value;
                }
                updateDisplay();
                return;
            }

            if (type === 'operator') {
                // prevent starting with operator unless it's minus (negative)
                if (currentExpression === "") {
                    if (value === '−') {
                        currentExpression = "−";
                    } else if (value === '+') {
                        // optional: ignore leading plus
                        return;
                    } else {
                        return;
                    }
                }
                else {
                    let lastChar = currentExpression.slice(-1);
                    // if last char is operator, replace with new operator (override)
                    if (['+', '−', '×', '÷', '%'].includes(lastChar)) {
                        currentExpression = currentExpression.slice(0, -1) + value;
                    } else {
                        currentExpression += value;
                    }
                }
                lastActionWasEquals = false;
                updateDisplay();
                return;
            }

            if (type === 'percent') {
                // handle percent: convert current number to percent
                if (currentExpression !== "") {
                    let evaluated = computeExpression(currentExpression);
                    if (evaluated !== null && !isNaN(evaluated)) {
                        let percentVal = evaluated / 100;
                        currentExpression = formatNumber(percentVal);
                        lastActionWasEquals = false;
                        updateDisplay();
                    } else {
                        // fallback if expression invalid: do nothing
                    }
                }
                return;
            }
        }

        // clear everything (AC)
        function allClear() {
            currentExpression = "";
            lastResult = null;
            lastActionWasEquals = false;
            updateDisplay();
        }

        // backspace (⌫)
        function backspace() {
            if (lastActionWasEquals) {
                allClear();
                return;
            }
            if (currentExpression.length > 0) {
                currentExpression = currentExpression.slice(0, -1);
                updateDisplay();
            } else {
                // if empty but result display might be from lastResult, reset to zero
                if (lastResult !== null && !lastActionWasEquals) {
                    allClear();
                }
            }
        }

        // equals with chain logic (store result as expression for further operations)
        function evaluateEquals() {
            if (currentExpression === "") {
                if (lastResult !== null) {
                    resultEl.innerText = formatNumber(lastResult);
                }
                return;
            }
            let prepared = prepareExpressionForEval(currentExpression);
            if (prepared === "") return;
            let computed = evaluateMath(prepared);
            if (isNaN(computed) || !isFinite(computed)) {
                resultEl.innerText = "Error";
                // keep expression but mark error state temporary
                return;
            }
            let formattedRes = formatNumber(computed);
            resultEl.innerText = formattedRes;
            lastResult = computed;
            // setting expression to computed result (so chain works)
            currentExpression = formattedRes;
            lastActionWasEquals = true;
            updateDisplay();
        }

        // additional handlers for percentage key as separate operation (modify expression)
        function handlePercent() {
            if (lastActionWasEquals) {
                allClear();
            }
            // find last numeric block and replace with percentage transformed expression
            if (currentExpression === "") return;
            // simpler approach: compute current expression's value, replace entire line with result/100
            let evaluated = computeExpression(currentExpression);
            if (evaluated !== null && !isNaN(evaluated)) {
                let percentResult = evaluated / 100;
                currentExpression = formatNumber(percentResult);
                lastActionWasEquals = false;
                updateDisplay();
            } else {
                // try to handle percentage suffix on last number
                let match = currentExpression.match(/(\d+(?:\.\d+)?)$/);
                if (match) {
                    let num = parseFloat(match[1]);
                    let percentVal = num / 100;
                    let newExpr = currentExpression.slice(0, -match[1].length) + percentVal;
                    currentExpression = newExpr;
                    updateDisplay();
                } else {
                    // no number, do nothing
                }
            }
        }

        // ----- attach event listeners both mouse + touch -----
        function setupButtons() {
            // numbers
            document.querySelectorAll('.number').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    let numValue = btn.getAttribute('data-num');
                    if (numValue === '.') {
                        handleInput('.', 'decimal');
                    } else {
                        handleInput(numValue, 'number');
                    }
                });
            });
            // operators + - × ÷
            document.querySelectorAll('.operator').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    let op = btn.getAttribute('data-op');
                    if (op === '%') {
                        handlePercent();   // special percent action
                        return;
                    }
                    handleInput(op, 'operator');
                });
            });
            // equals
            const equalsBtn = document.querySelector('.equals');
            if (equalsBtn) {
                equalsBtn.addEventListener('click', () => {
                    evaluateEquals();
                });
            }
            // clear
            const clearBtn = document.querySelector('.clear');
            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    allClear();
                });
            }
            // backspace
            const backBtn = document.querySelector('.backspace');
            if (backBtn) {
                backBtn.addEventListener('click', () => {
                    backspace();
                });
            }
        }

        // also keyboard support (bonus for github)
        function handleKeyboard(e) {
            const key = e.key;
            // numbers & decimal
            if (/^[0-9]$/.test(key)) {
                e.preventDefault();
                handleInput(key, 'number');
            } else if (key === '.') {
                e.preventDefault();
                handleInput('.', 'decimal');
            } else if (key === '+' || key === '-') {
                e.preventDefault();
                let opSymbol = key === '+' ? '+' : '−';
                handleInput(opSymbol, 'operator');
            } else if (key === '*') {
                e.preventDefault();
                handleInput('×', 'operator');
            } else if (key === '/') {
                e.preventDefault();
                handleInput('÷', 'operator');
            } else if (key === '%') {
                e.preventDefault();
                handlePercent();
            } else if (key === 'Enter' || key === '=') {
                e.preventDefault();
                evaluateEquals();
            } else if (key === 'Backspace') {
                e.preventDefault();
                backspace();
            } else if (key === 'Escape' || key === 'Delete') {
                e.preventDefault();
                allClear();
            }
        }

        // initial display
        function init() {
            allClear(); // ensures '0' ready
            setupButtons();
            window.addEventListener('keydown', handleKeyboard);
        }

        init();
    })();
</script>
</body>
</html>
